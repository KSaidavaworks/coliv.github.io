<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CoLiv | Sign In</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        background: "#fbf9f6",
                        surface: "#ffffff",
                        "surface-container": "#efeeeb",
                        "on-surface": "#1b1c1a",
                        "on-surface-variant": "#424845",
                        primary: "#6A7E3F",
                        secondary: "#4C5C2D",
                        outline: "#727875",
                        "outline-variant": "#c2c8c4"
                    },
                    fontFamily: {
                        serif: ["Newsreader", "serif"],
                        sans: ["Manrope", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-serif { font-family: 'Newsreader', serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
        
        @keyframes fadeSlideInRight { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-fade-slide-in { animation: fadeSlideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex">

    <!-- Left Form Pane -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 relative overflow-hidden bg-background">
        
        <!-- Subtle background decorative element -->
        <div class="absolute top-[10%] left-[-10%] w-[500px] h-[500px] bg-secondary/5 rounded-full blur-3xl pointer-events-none"></div>

        <div class="w-full max-w-md animate-fade-slide-in relative z-10" id="form-container">
            
            <div class="flex items-center gap-2 mb-12 cursor-pointer" onclick="window.location.href='../holiv_home/code.html'">
                <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">nature_people</span>
                <span class="text-3xl font-serif italic text-primary tracking-tight">CoLiv</span>
            </div>

            <h2 class="text-4xl font-serif text-on-surface mb-2">Welcome Back</h2>
            <p class="text-on-surface-variant mb-8">Sign in to continue your conscious living journey.</p>

            <!-- Social Buttons -->
            <div class="flex flex-col gap-4 mb-8">
                <button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-surface border border-outline-variant/30 rounded-full text-on-surface font-bold hover:bg-surface-container transition-colors shadow-sm" onclick="alert('Google Auth Triggered'); window.location.href='../user_profile/code.html'">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google"/>
                    Sign in with Google
                </button>
                <button class="w-full flex items-center justify-center gap-3 py-3 px-4 bg-surface border border-outline-variant/30 rounded-full text-on-surface font-bold hover:bg-surface-container transition-colors shadow-sm" onclick="alert('Apple Auth Triggered'); window.location.href='../user_profile/code.html'">
                    <img src="https://www.svgrepo.com/show/511330/apple-173.svg" class="w-5 h-5" alt="Apple"/>
                    Sign in with Apple
                </button>
            </div>

            <div class="flex items-center gap-4 mb-8 text-on-surface-variant/50 text-sm font-bold uppercase tracking-widest">
                <hr class="flex-grow border-outline-variant/30"/>
                <span>or</span>
                <hr class="flex-grow border-outline-variant/30"/>
            </div>

            <!-- Email Form -->
            <form onsubmit="event.preventDefault(); window.location.href='../user_profile/code.html'" class="flex flex-col gap-5">
                <div>
                    <label class="block text-sm font-bold text-on-surface mb-1">Email Address</label>
                    <input type="email" required class="w-full px-4 py-3 bg-surface border border-outline-variant/50 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40" placeholder="hello@example.com" value="jane@example.com"/>
                </div>
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label class="block text-sm font-bold text-on-surface">Password</label>
                        <a href="#" class="text-xs text-primary font-bold hover:underline" onclick="alert('Reset password link sent!')">Forgot Password?</a>
                    </div>
                    <input type="password" required class="w-full px-4 py-3 bg-surface border border-outline-variant/50 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/40" placeholder="••••••••" value="password123"/>
                </div>
                
                <button type="submit" class="w-full py-4 mt-4 bg-primary text-white rounded-full font-bold text-lg hover:bg-secondary transition-colors shadow-lg shadow-primary/20 hover:-translate-y-0.5 active:scale-95 flex justify-center items-center gap-2">
                    Sign In
                </button>
            </form>

            <p class="text-center mt-8 text-sm text-on-surface-variant">
                Don't have an account? <a href="../signup/code.html" class="text-primary font-bold hover:underline underline-offset-4">Join CoLiv</a>
            </p>
        </div>
    </div>

    <!-- Right Image Pane -->
    <div class="hidden lg:flex w-1/2 relative bg-surface-container overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1618220179428-22790b461013?q=80&w=1400&auto=format&fit=crop');"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-transparent to-transparent"></div>
    </div>

</body>
</html>
